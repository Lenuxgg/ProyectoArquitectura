<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="../js/theme.js?v=8"></script>
    <title>Proyectos - CEGA</title>
    <link rel="stylesheet" href="../css/styles.css?v=8">
</head>
<body>

    <header class="main-header">
        <h1>Gestión de Proyectos</h1>
        <p id="subtituloProyectos">Listado general de proyectos registrados</p>
    </header>

    <nav class="navbar">
        <a href="../index.html">Inicio</a>
        <a href="proyectos.html">Proyectos</a>
        <a id="linkCrearProyecto" href="crear-proyecto.html">Crear Proyecto</a>
        <a id="linkContabilidad" href="contabilidad.html">Contabilidad</a>

        <div id="usuarioSesion" style="margin-left:auto;"></div>

        <button class="theme-toggle" type="button" data-theme-toggle>Modo oscuro</button>
    </nav>

    <main class="container">
        <div class="actions">
            <h2 id="tituloListado">Proyectos</h2>
            <a id="btnNuevoProyecto" class="btn-primary" href="crear-proyecto.html">Nuevo Proyecto</a>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Descripción</th>
                        <th>Fecha Inicio</th>
                        <th>Fecha Fin</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaProyectos">
                    <tr>
                        <td colspan="7">Cargando proyectos...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <footer>
        <p>Arquitectura</p>
    </footer>

    <script src="../js/api.js?v=8"></script>
    <script src="../js/auth.js?v=8"></script>
    <script src="../js/proyectos.js?v=9"></script>

    <script>
        validarSesion();
        pintarUsuarioEnNavbar();

        if (!usuarioEsAdmin()) {
            const btnNuevoProyecto = document.getElementById("btnNuevoProyecto");
            const linkCrearProyecto = document.getElementById("linkCrearProyecto");
            const subtituloProyectos = document.getElementById("subtituloProyectos");
            const tituloListado = document.getElementById("tituloListado");

            if (btnNuevoProyecto) {
                btnNuevoProyecto.style.display = "none";
            }

            if (linkCrearProyecto) {
                linkCrearProyecto.style.display = "none";
            }

            if (subtituloProyectos) {
                subtituloProyectos.textContent = "Proyectos asignados al empleado";
            }

            if (tituloListado) {
                tituloListado.textContent = "Mis proyectos asignados";
            }
        }

        cargarProyectos();
    </script>

</body>
</html>
