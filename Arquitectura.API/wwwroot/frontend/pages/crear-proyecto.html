<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="../js/theme.js?v=8"></script>
    <title>Crear Proyecto - CEGA</title>
    <link rel="stylesheet" href="../css/styles.css?v=8">
</head>
<body>

    <header class="main-header">
        <h1>Crear Nuevo Proyecto</h1>
        <p>Registro de proyecto desde el frontend</p>
    </header>

    <nav class="navbar">
        <a href="../index.html">Inicio</a>
        <a href="proyectos.html">Proyectos</a>
            <a href="contabilidad.html">Contabilidad</a>
        <button class="theme-toggle" type="button" data-theme-toggle>Modo oscuro</button>
    </nav>

    <main class="container">
        <section class="form-card">
            <h2>Datos del proyecto</h2>

            <div class="form-group">
                <label>Nombre</label>
                <input type="text" id="nombre" placeholder="Ejemplo: Proyecto Casa Moderna">
            </div>

            <div class="form-group">
                <label>Descripción</label>
                <textarea id="descripcion" placeholder="Descripción general del proyecto"></textarea>
            </div>

            <div class="form-group">
                <label>Fecha de inicio</label>
                <input type="date" id="fechaInicio">
            </div>

            <button class="btn-secondary" onclick="crearProyecto()">Guardar Proyecto</button>
            <a class="btn-danger" href="proyectos.html">Cancelar</a>

            <p id="mensajeProyecto" class="message"></p>
        </section>
    </main>

    <script src="../js/api.js?v=8"></script>
    <script src="../js/proyectos.js?v=8"></script>

</body>
</html>
